<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The Philosophy Primer</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=19" />
    <script>
      (function () {
        var stored = localStorage.getItem("phil-primer-theme");
        var theme =
          stored ||
          (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme === "dark" ? "dark" : "light");
      })();
    </script>
  </head>
  <body>
    <header class="topbar">
      <nav aria-label="Primary">
        <a href="#/" data-nav="home">Search</a>
        <a href="#/browse" data-nav="browse">Browse</a>
      </nav>
      <div class="topbar-end">
        <p id="entry-count">Loading…</p>
        <button
          id="theme-toggle"
          type="button"
          class="theme-toggle"
          aria-label="Toggle color theme"
          title="Toggle theme"
        >
          <span class="theme-icon theme-icon-sun" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
              <circle cx="12" cy="12" r="4" />
              <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
            </svg>
          </span>
          <span class="theme-icon theme-icon-moon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
              <path d="M21 14.5A8.5 8.5 0 0 1 9.5 3 7 7 0 1 0 21 14.5z" />
            </svg>
          </span>
        </button>
      </div>
    </header>

    <main class="page is-home">
      <section class="search-panel" aria-label="Search entries">
        <div class="search-hero">
          <p class="search-heading">The Philosophy Primer</p>
          <p class="search-sub">
            Age-appropriate summaries from the
            <a
              class="search-sep-link"
              href="https://plato.stanford.edu/index.html"
              target="_blank"
              rel="noreferrer"
              >Stanford Encyclopedia of Philosophy</a
            >
          </p>
        </div>
        <div class="search-field-wrap">
          <div class="search-field">
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
              <circle cx="11" cy="11" r="7" />
              <path d="M20 20l-3.5-3.5" />
            </svg>
            <input
              id="search-input"
              type="search"
              placeholder="Search entries…"
              autocomplete="off"
              aria-autocomplete="list"
              aria-controls="search-suggestions"
              aria-expanded="false"
            />
            <button id="clear-search" type="button" class="clear-btn" hidden>Clear</button>
          </div>
          <div
            id="search-suggestions"
            class="search-suggestions"
            role="listbox"
            aria-label="Suggested entries"
            hidden
          ></div>
        </div>
        <div class="search-meta">
          <span id="result-count"></span>
        </div>
      </section>

      <section id="view" class="view" aria-live="polite"></section>
    </main>

    <script src="./app.js?v=19"></script>
  </body>
</html>
